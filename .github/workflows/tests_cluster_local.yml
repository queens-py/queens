# yamllint disable
name: tests_cluster_local

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run_cluster_local_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build single-node SLURM image
        run: |
          docker build \
            -f tests/integration_tests/cluster_local/docker/Dockerfile \
            -t queens-slurm-ci:local \
            .

      - name: Run cluster_local tests against real SLURM
        run: |
          docker run --rm queens-slurm-ci:local \
            /opt/conda/bin/conda run --no-capture-output -n queens \
              pytest -m cluster_local tests/integration_tests/cluster_local/ -v
