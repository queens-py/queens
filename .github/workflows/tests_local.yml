# yamllint disable
name: tests_local

on:
  schedule:
    - cron: "0 1 * * *"
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Set TEST_TIMING_OPTION if local test should be timed. Default is off.
  TEST_TIMING_OPTION: ""

jobs:
  run_tests:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[develop]
      - name: Code checks
        run: |
          echo "::group::Run isort..."
          isort --check-only queens tests
          echo "::endgroup::"

          echo "::group::Run black..."
          black --check queens tests
          echo "::endgroup::"

          echo "::group::Run pylint..."
          pylint --rcfile=.pylintrc --disable=duplicate-code queens tests
          echo "::endgroup::"

          echo "::group::Run ruff..."
          ruff check
          echo "::endgroup::"

          # echo "::group::Create code quality report..."
          # pylint queens tests --rcfile=.pylintrc --output-format=json:pylint_warnings.json --fail-under 0
          # python .gitlab/pipeline_utils/code_quality_creator.py pylint_warnings.json
          # echo "::endgroup::"

          echo "::group::Check compatibility with licenses of dependencies..."
          liccheck -r requirements.txt
          echo "::endgroup::"

          echo "::group::Create an rc file for the license header check..."
          python .gitlab/pipeline_utils/create_licenserc.py --template_file ".gitlab/pipeline_utils/.licenserc_template.yaml" --text_file "license_header.tmpl" --output_file ".licenserc.yaml" --placeholder "license_header"
          echo "::endgroup::"
      - name: Check license headers
        uses: apache/skywalking-eyes/header@v0.4.0
      - name: Check conventional commit messages
        uses: webiny/action-conventional-commits@v1.3.0
      - name: Run pytest
        run: |
          pytest -v -m "unit_tests or integration_tests" --cov --cov-report=term --cov-report=html:html_coverage_report --cov-report=xml:xml_coverage_report.xml $TEST_TIMING_OPTION --color=yes -o junit_logging=all --junitxml=test_junit.xml
          python .github/xml_summaries_to_md.py test_junit.xml xml_coverage_report.xml >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage report
        uses: actions/upload-pages-artifact@v3
        with:
          name: html-coverage-report
          path: html_coverage_report/
          retention-days: 7
      - name: Publish junit pytest report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "test_junit.xml"
          annotate_only: true
          job_summary: false
