# Single-node SLURM config for the cluster_local integration test.
# PLACEHOLDER_HOST is swapped for the real hostname at boot by start-slurm.sh.

ClusterName=queens-ci
SlurmctldHost=PLACEHOLDER_HOST
SlurmUser=slurm

# Plugins that work without cgroups.
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU

# config_overrides: let slurmd start even if the configured CPUs differ from the runner.
SlurmdParameters=config_overrides
ReturnToService=2

AuthType=auth/munge

# Ports, state, pid, logs.
SlurmctldPort=6817
SlurmdPort=6818
SlurmctldPidFile=/run/slurm/slurmctld.pid
SlurmdPidFile=/run/slurm/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/lib/slurm
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

# Short timers so the node reaches IDLE quickly in CI.
SlurmctldTimeout=60
SlurmdTimeout=60
InactiveLimit=0
MinJobAge=2
KillWait=10
Waittime=0

# The single compute node = this container (values need not match real hardware).
NodeName=PLACEHOLDER_HOST CPUs=4 RealMemory=1024 State=UNKNOWN
PartitionName=normal Nodes=ALL Default=YES MaxTime=INFINITE State=UP
