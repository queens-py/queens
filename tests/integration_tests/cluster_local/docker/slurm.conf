# Single-node, container-safe slurm.conf for the cluster_local integration test.
#
# Everything cgroup-related is deliberately omitted: a container on a GitHub
# runner cannot use privileged cgroup controllers reliably.
#
# PLACEHOLDER_HOST is replaced with the container's real hostname at boot by
# start-slurm.sh (slurmd only registers if NodeName matches its hostname).
#
# Grounded in:
#   - dask-jobqueue ci/slurm/slurm.conf      (proctrack/linuxproc, no cgroup)
#   - giovtorres/slurm-docker-cluster         (config_overrides, cons_tres)

ClusterName=queens-ci
SlurmctldHost=PLACEHOLDER_HOST
SlurmUser=slurm

# --- container-safe process/task/select plugins (NO cgroups) ---
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU

# let slurmd register even if configured CPUs differ from the runner hardware
SlurmdParameters=config_overrides
ReturnToService=2

AuthType=auth/munge

# --- ports / state / pid / logs ---
SlurmctldPort=6817
SlurmdPort=6818
SlurmctldPidFile=/run/slurm/slurmctld.pid
SlurmdPidFile=/run/slurm/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/lib/slurm
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

# --- short timers so the node reaches IDLE quickly in CI ---
SlurmctldTimeout=60
SlurmdTimeout=60
InactiveLimit=0
MinJobAge=2
KillWait=10
Waittime=0

# --- the single compute node = this container (config_overrides makes the
#     configured values win, so these need not match the real hardware) ---
NodeName=PLACEHOLDER_HOST CPUs=4 RealMemory=1024 State=UNKNOWN
PartitionName=normal Nodes=ALL Default=YES MaxTime=INFINITE State=UP
