# Container-safe cgroup config for the cluster_local CI test.
#
# GitHub Action runners give the container a cgroup/v2 hierarchy but no
# systemd/dbus. By default slurmd asks systemd (over dbus) to create a cgroup
# scope (cgroup_dbus_attach_to_scope), which fails with
# "/run/dbus/system_bus_socket: No such file" and aborts.
#
# IgnoreSystemd makes slurmd skip dbus/systemd entirely and just `mkdir` the
# cgroup directories itself -- the supported way to run cgroup/v2 on a system
# without systemd. See https://slurm.schedmd.com/cgroup.conf.html
#
# (Note: CgroupPlugin=disabled does NOT exist in slurm 23.11 -- slurmd then
# looks for a plugin literally named "disabled" and fails.)
CgroupPlugin=autodetect
IgnoreSystemd=yes
