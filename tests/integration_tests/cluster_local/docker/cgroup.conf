# Container-safe cgroup config for the cluster_local CI test.
#
# GitHub Action runners give the container a cgroup/v2 hierarchy but no
# systemd/dbus, so slurmd cannot attach to a cgroup scope
# (cgroup_dbus_attach_to_scope -> /run/dbus/system_bus_socket missing) and dies
# with "Unable to initialize cgroup plugin".
#
# This test does not need cgroup enforcement: process tracking uses
# proctrack/linuxproc and TaskPlugin=task/none (see slurm.conf). Disable the
# cgroup plugin entirely.
CgroupPlugin=disabled
